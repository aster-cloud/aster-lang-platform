name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # 防漂移 gate（ADR 0023 阶段6）：本仓即 plan/script 所在，直接对自身 root 校验
      # platform artifact（self version == platformVersion）。
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Release-plan drift gate
        run: |
          python3 scripts/release-plan/check-artifact.py \
            --plan release-plan.json --artifact platform --repo-root .

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      # Catalog is just a generated TOML — building it validates the DSL
      # and that publishing wiring is intact. No tests to run.
      - name: Build + verify catalog generates
        run: ./gradlew build generateCatalogAsToml

      - name: Show generated catalog
        run: cat build/version-catalog/libs.versions.toml
